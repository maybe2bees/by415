<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>生日快乐 🎂</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ============ 第一页：祝福页 ============ -->
  <section id="page1" class="page active">
    <div class="stars" aria-hidden="true"></div>

    <div class="greeting">
      <p class="line line1">祝我最好最可爱最喜欢的朋友</p>
      <p class="line line2" id="line2"></p>
    </div>

    <div class="emoji-layer" id="emojiLayer" aria-hidden="true"></div>

    <button class="cake-button" id="cakeButton" type="button" aria-label="点击吹蜡烛，进入下一页">
      <span class="cake-emoji">🎂</span>
      <span class="cake-glow" aria-hidden="true"></span>
      <span class="cake-hint">↑点击这里吹蜡烛噢</span>
    </button>
  </section>

  <!-- ============ 第二页：信件页 ============ -->
  <section id="page2" class="page">
    <div class="paper">
      <div class="paper-torn-edge" aria-hidden="true"></div>
      <div class="seal" aria-hidden="true">🕯️</div>

      <div class="letter-content" id="letterContent"></div>

      <!-- ============================================================
           视频占位区域：
           把你自己录制的生日祝福视频文件放到 assets/video/ 文件夹里，
           并把文件名改成 birthday-video.mp4（或者改下面 source 的 src）。
           如果想加封面图，把封面图放到 assets/video/ 里，
           命名为 poster.jpg，或者改下面 poster="" 的路径。
           详细说明见根目录的 README.md
      ============================================================= -->
      <div class="video-section" id="videoSection">
        <p class="video-hint">🎁 给你准备的视频 🎁</p>
        <video
          class="birthday-video"
          controls
          playsinline
          preload="metadata"
          poster="assets/video/poster.jpg">
          <source src="assets/video/birthday-video.mp4" type="video/mp4">
          你的浏览器不支持视频播放，可以下载后查看。
        </video>
      </div>
    </div>
  </section>

  <!-- ============================================================
       翻信纸沙沙声音效占位：
       把音效文件放到 assets/audio/ 文件夹里，命名为 paper-sound.mp3
       （没有文件也不影响网页正常使用，只是没有声音而已）
       推荐去 Pixabay / Mixkit 等免费音效网站下载 "paper" 或 "page turn" 相关音效
  ============================================================= -->
  <audio id="paperSound" src="assets/audio/paper-sound.mp3" preload="auto"></audio>

  <script src="script.js"></script>
</body>
</html>
